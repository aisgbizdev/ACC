openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for ACC - APUPPT Control Center
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: pts
    description: PT (Perusahaan Terdaftar) operations
  - name: dashboard
    description: Dashboard summary
  - name: activities
    description: Daily activity operations
  - name: findings
    description: Findings operations
  - name: reports
    description: Report summary
  - name: branches
    description: Branch operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated or wrong current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset a user's password (superadmin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordBody"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pts:
    get:
      operationId: listPts
      tags: [pts]
      summary: List all PTs
      responses:
        "200":
          description: List of PTs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pt"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pts/{id}:
    get:
      operationId: getPt
      tags: [pts]
      summary: Get PT detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PT detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PtDetail"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PT not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pts/{id}/status:
    get:
      operationId: getPtStatus
      tags: [pts]
      summary: Get PT traffic light status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PT status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PtStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary for all PTs
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /branches:
    get:
      operationId: listBranches
      tags: [branches]
      summary: List branches
      parameters:
        - name: ptId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Branch"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List activities
      parameters:
        - name: ptId
          in: query
          schema:
            type: string
        - name: branchId
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
        - name: reviewStatus
          in: query
          schema:
            type: string
            enum: [pending_review, reviewed, signed_off]
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyActivity"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createActivity
      tags: [activities]
      summary: Create daily activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityBody"
      responses:
        "201":
          description: Activity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyActivity"
        "400":
          description: Validation error or duplicate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/{id}:
    put:
      operationId: updateActivity
      tags: [activities]
      summary: Update daily activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActivityBody"
      responses:
        "200":
          description: Activity updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyActivity"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Activity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/{id}/review:
    post:
      operationId: reviewActivity
      tags: [activities]
      summary: DK reviews/acknowledges an activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewActivityBody"
      responses:
        "200":
          description: Activity reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyActivity"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/{id}/signoff:
    post:
      operationId: signOffActivity
      tags: [activities]
      summary: DU signs off on a reviewed activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Activity signed off
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyActivity"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /findings:
    get:
      operationId: listFindings
      tags: [findings]
      summary: List findings
      parameters:
        - name: ptId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, follow_up, completed]
      responses:
        "200":
          description: List of findings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Finding"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createFinding
      tags: [findings]
      summary: Create finding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFindingBody"
      responses:
        "201":
          description: Finding created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /findings/{id}:
    put:
      operationId: updateFinding
      tags: [findings]
      summary: Update finding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFindingBody"
      responses:
        "200":
          description: Finding updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Finding not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /findings/{id}/acknowledge:
    post:
      operationId: acknowledgeFinding
      tags: [findings]
      summary: DK acknowledges a finding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcknowledgeFindingBody"
      responses:
        "200":
          description: Finding acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /findings/{id}/complete:
    patch:
      operationId: completeFinding
      tags: [findings]
      summary: Mark finding as completed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Finding completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Finding not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/summary:
    get:
      operationId: getReportsSummary
      tags: [reports]
      summary: Get reports summary per PT
      responses:
        "200":
          description: Reports summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PtReportSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        rememberMe:
          type: boolean
      required:
        - username
        - password

    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required:
        - currentPassword
        - newPassword

    ResetPasswordBody:
      type: object
      properties:
        userId:
          type: string
        newPassword:
          type: string
      required:
        - userId
        - newPassword

    AuthUser:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        username:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/AuthUserRole"
        ptId:
          type: string
          nullable: true
      required:
        - id
        - name
        - username
        - email
        - role

    AuthUserRole:
      type: string
      enum: [apuppt, dk, du, owner, superadmin]

    Pt:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - code
        - name
        - createdAt

    PtDetail:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [green, yellow, red]
        lastActivityDate:
          type: string
          nullable: true
        openFindingsCount:
          type: integer
      required:
        - id
        - code
        - name
        - createdAt
        - status
        - openFindingsCount

    PtStatus:
      type: object
      properties:
        ptId:
          type: string
        status:
          type: string
          enum: [green, yellow, red]
        lastActivityDate:
          type: string
          nullable: true
        openFindingsCount:
          type: integer
        overdueCount:
          type: integer
      required:
        - ptId
        - status
        - openFindingsCount
        - overdueCount

    DashboardSummary:
      type: object
      properties:
        totalPts:
          type: integer
        greenCount:
          type: integer
        yellowCount:
          type: integer
        redCount:
          type: integer
        ptStatuses:
          type: array
          items:
            $ref: "#/components/schemas/PtStatusCard"
      required:
        - totalPts
        - greenCount
        - yellowCount
        - redCount
        - ptStatuses

    PtStatusCard:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [green, yellow, red]
        lastActivityDate:
          type: string
          nullable: true
        openFindingsCount:
          type: integer
        overdueCount:
          type: integer
      required:
        - id
        - code
        - name
        - status
        - openFindingsCount
        - overdueCount

    DailyActivity:
      type: object
      properties:
        id:
          type: string
        ptId:
          type: string
        userId:
          type: string
        branchId:
          type: string
          nullable: true
        branchName:
          type: string
          nullable: true
        date:
          type: string
          format: date
        activityType:
          type: string
          enum:
            - kyc
            - cdd
            - screening
            - monitoring_transaksi
            - pelaporan
            - sosialisasi
            - lainnya
        itemsReviewed:
          type: integer
        customerRiskCategories:
          type: array
          items:
            type: string
            enum: [high, medium, low]
          nullable: true
        hasFinding:
          type: boolean
        findingSummary:
          type: string
          nullable: true
        findingStatus:
          type: string
          enum: [pending, follow_up, completed]
          nullable: true
        notes:
          type: string
          nullable: true
        dkReviewedAt:
          type: string
          format: date-time
          nullable: true
        dkReviewedBy:
          type: string
          nullable: true
        dkNotes:
          type: string
          nullable: true
        duSignedOffAt:
          type: string
          format: date-time
          nullable: true
        duSignedOffBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - ptId
        - userId
        - date
        - activityType
        - itemsReviewed
        - hasFinding
        - createdAt
        - updatedAt

    ReviewActivityBody:
      type: object
      properties:
        notes:
          type: string
          nullable: true

    CreateActivityBody:
      type: object
      properties:
        ptId:
          type: string
        branchId:
          type: string
          nullable: true
        date:
          type: string
          format: date
        activityType:
          type: string
          enum:
            - kyc
            - cdd
            - screening
            - monitoring_transaksi
            - pelaporan
            - sosialisasi
            - lainnya
        itemsReviewed:
          type: integer
        customerRiskCategories:
          type: array
          items:
            type: string
            enum: [high, medium, low]
          nullable: true
        hasFinding:
          type: boolean
        findingSummary:
          type: string
          nullable: true
        findingStatus:
          type: string
          enum: [pending, follow_up, completed]
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - ptId
        - date
        - activityType
        - itemsReviewed
        - hasFinding

    UpdateActivityBody:
      type: object
      properties:
        branchId:
          type: string
          nullable: true
        activityType:
          type: string
          enum:
            - kyc
            - cdd
            - screening
            - monitoring_transaksi
            - pelaporan
            - sosialisasi
            - lainnya
        itemsReviewed:
          type: integer
        customerRiskCategories:
          type: array
          items:
            type: string
            enum: [high, medium, low]
          nullable: true
        hasFinding:
          type: boolean
        findingSummary:
          type: string
          nullable: true
        findingStatus:
          type: string
          enum: [pending, follow_up, completed]
          nullable: true
        notes:
          type: string
          nullable: true

    Finding:
      type: object
      properties:
        id:
          type: string
        ptId:
          type: string
        branchId:
          type: string
          nullable: true
        branchName:
          type: string
          nullable: true
        reportedBy:
          type: string
        date:
          type: string
          format: date
        findingText:
          type: string
        status:
          type: string
          enum: [pending, follow_up, completed]
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        dkAcknowledgedAt:
          type: string
          format: date-time
          nullable: true
        dkAcknowledgedBy:
          type: string
          nullable: true
        dkNotes:
          type: string
          nullable: true
        closedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - ptId
        - reportedBy
        - date
        - findingText
        - status
        - createdAt
        - updatedAt

    AcknowledgeFindingBody:
      type: object
      properties:
        notes:
          type: string
          nullable: true

    CreateFindingBody:
      type: object
      properties:
        ptId:
          type: string
        branchId:
          type: string
          nullable: true
        date:
          type: string
          format: date
        findingText:
          type: string
        status:
          type: string
          enum: [pending, follow_up, completed]
        notes:
          type: string
          nullable: true
      required:
        - ptId
        - date
        - findingText
        - status

    UpdateFindingBody:
      type: object
      properties:
        findingText:
          type: string
        status:
          type: string
          enum: [pending, follow_up, completed]
        notes:
          type: string
          nullable: true

    PtReportSummary:
      type: object
      properties:
        ptId:
          type: string
        ptCode:
          type: string
        ptName:
          type: string
        totalActivities:
          type: integer
        totalFindings:
          type: integer
        openFindings:
          type: integer
        completedFindings:
          type: integer
        status:
          type: string
          enum: [green, yellow, red]
        lastActivityDate:
          type: string
          nullable: true
      required:
        - ptId
        - ptCode
        - ptName
        - totalActivities
        - totalFindings
        - openFindings
        - completedFindings
        - status

    Branch:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        notes:
          type: string
          nullable: true
        ptId:
          type: string
        ptCode:
          type: string
          nullable: true
        ptName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - ptId
        - createdAt
